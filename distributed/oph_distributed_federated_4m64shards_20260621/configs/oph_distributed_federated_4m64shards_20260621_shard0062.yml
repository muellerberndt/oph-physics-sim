  diagnostic. This tests whether persistent observer-facing record objects populate
  the modular-response H3 chart under shuffled-incidence controls, and exports H3-fitted
  holonomy/defect worldlines for proto-particle visualization. It instantiates OPH
  observer-like self-reading systems: bounded screen patches with local state, ports/boundaries,
  readback, records, feedback/repair moves, and public receipts. It is not a final
  strict neutral 3D bulk, matter-particle, or physical CMB claim unless emitted gates
  pass.


  Distributed kernel shard: bounded observer-like self-reading screen patch with local
  state, ports/boundaries, readback, records, feedback/repair moves, and public receipts.
  Not a standalone strict global bulk claim.'
