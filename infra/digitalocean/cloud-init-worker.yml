#cloud-config
package_update: true
package_upgrade: false

packages:
  - git
  - htop
  - jq
  - python3
  - python3-pip
  - python3-venv
  - rsync
  - tmux

users:
  - default
  - name: oph
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      # Replace this with the same public SSH key you use locally.
      - ssh-ed25519 REPLACE_WITH_YOUR_PUBLIC_KEY oph-fpe

write_files:
  - path: /opt/oph-fpe/README_BOOTSTRAP.txt
    permissions: "0644"
    content: |
      OPH-FPE worker bootstrap complete.

      Recommended deploy from your local machine:

        rsync -az --delete /path/to/oph-physics-sim/ oph@DROPLET_IP:/opt/oph-fpe/oph-physics-sim/
        ssh oph@DROPLET_IP 'cd /opt/oph-fpe/oph-physics-sim && python3 -m venv .venv && source .venv/bin/activate && pip install -e ".[dev]"'

      Then run a split seed batch in tmux or systemd.

runcmd:
  - mkdir -p /opt/oph-fpe/runs
  - chown -R oph:oph /opt/oph-fpe
  - [ bash, -lc, "echo 'vm.max_map_count=262144' >/etc/sysctl.d/99-oph-fpe.conf && sysctl --system" ]
  - [ bash, -lc, "curl -fsSL https://repos.insights.digitalocean.com/install.sh | bash || true" ]
  - [ bash, -lc, "systemctl enable --now do-agent || true" ]
