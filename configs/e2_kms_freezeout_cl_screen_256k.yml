name: e2_kms_freezeout_cl_screen_256k
seed: 20260621
claim_boundary: >
  Measurement-facing OPH screen proxy at 256k patches. Runs finite KMS/BW collar transport,
  then emits a freezeout-screen C_l proxy from observer-facing record fields only if the
  BW/KMS gates pass. This is not a physical CMB prediction, not a 3D bulk claim, and not a
  Boltzmann adapter.

graph:
  family: fibonacci_sphere
  patch_count: 262144
  neighbors: 12

group:
  name: S3

boundary_program:
  mode: support_visible_cap_net_hot
  cap_count: 32
  sharpness: 8.0
  tangent_weight: 0.35
  endpoint_noise_probability: 0.35

screen:
  chart: support_visible_s2_cellulation
  carrier: federated_echosahedral_patch
  ports_per_patch: 12
  cap_family: round_caps_on_s2

oph_constants:
  P: 1.6309682094039593
  P_source: endpoint_public
  use_P_for: [cell_area, cell_entropy, cap_capacity, residual_weighting]

screen_units:
  mode: numerical_regulator

dynamics:
  cycles: 64
  repairs_per_cycle: 262144
  record_commit_cycles: 8
  beta_schedule:
    kind: geometric
    beta_start: 0.05
    beta_end: 15.0

modular_flow:
  enabled: true
  dt: 0.03
  damping: 0.012
  repair_load_coupling: 0.35
  cap_coupling: 0.08
  diffusion: 0.06
  cap_axes: 20

bw:
  mode: state_derived_modular_probe
  state_mode: transition_response_unitary
  target_operator_mode: permutation
  transition_response_time: 0.10
  transition_response_scale: 6.283185307179586
  cap_count: 8
  theta0: [0.35, 0.55, 0.75, 1.00]
  collar_width_mode: cell_scaled
  collar_k: 1.0
  times: [0.05, 0.10]
  normalization: "2pi"
  observables:
    - record_signature_projectors
    - repair_load_projectors
    - s3_sector_projectors
    - cumulative_repair_load_projectors
  regularizer_a: [1.0e-12]
  max_basis: 64
  k_interp: 8
  sim_k_interp: 1
  n_jobs: auto
  support_visible_smoothing_steps: 4
  support_visible_smoothing_alpha: 0.35
  selection:
    enabled: true
    sources: [kms_collar_transport_response, perturb_remeasure_response, repair_affinity_response]
    include_declared_sanity: true
    candidate_scales: [1.0, 3.141592653589793, 6.283185307179586, 12.566370614359172]
    times: [0.10]
    observables:
      - record_signature_projectors
      - repair_load_projectors
      - s3_sector_projectors
      - cumulative_repair_load_projectors
    max_basis: 64
    probe_steps: 4
    probe_repairs_per_source: 48
    probe_max_incident_edges: 12
    kms_response_scale: 6.283185307179586
    kms_transport_steps: 8

collar_markov:
  enabled: true
  max_triplets: 4096
  packet_bins:
    record_signature: 64
    stable_count: 8
    repair_load: 8
    s3_class_density: 6
  sector_conditioned: true
  write_recovery_bound: true

observers:
  sample_count: 128
  neighborhood_size: 96

observer_objects:
  enabled: true
  packet_mode: coarse_visible_packet
  signature_bins: 12
  include_s3_sector: true
  include_repair_load_bin: false
  min_support_size: 8
  persistence_horizon: 8
  counterfactual_perturbations: 16
  max_families: 4096

neutral_reconstruction:
  enabled: false
  require_bw_refinement_pass: true
  forbid_radial_depth_evidence: true

h3_population:
  source_state: freezeout
  response_mode: cap_transport_similarity
  transport_time: 0.10
  transport_scale: 6.283185307179586
  candidate_count: 8192
  candidate_radius: 2.0
  softness: 0.25
  pass_ratio: 0.85
  geometry_blend: 0.0
  field_names:
    - record_signature
    - stable_count
    - repair_load
    - cumulative_repair_load
    - local_mismatch_density
    - s3_class_density
    - s3_sector_class

h3_support_profiles:
  dedicated_cap_net: true
  cap_count: 40
  theta0: [0.35, 0.55, 0.75, 1.00, 1.25]
  collar_width_mode: cell_scaled
  collar_k: 1.0
  candidate_count: 8192
  timeline_candidate_count: 32768
  timeline_response_mode: support_transport_similarity
  timeline_transport_time: 0.10
  timeline_transport_scale: 6.283185307179586
  candidate_radius: 2.0
  softness: 0.25
  pass_ratio: 0.85
  min_support_count: 8
  min_cap_count: 6

cosmology:
  freezeout:
    enabled: true
    require_kms_bw_pass: true
    require_state_bw_controls: true
    require_neutral_reconstruction: false
    allow_screen_proxy_without_bulk: true
    commit_fraction: 0.95
    fields:
      - record_signature
      - stable_count
      - cumulative_repair_load
      - s3_class_density
      - modular_depth
  angular_power:
    estimator: spherical_harmonic
    harmonic_batch_size: 8192
    ell_max: 48
    pair_samples: 400000
    controls:
      - shuffled_field
      - random_gaussian

defects:
  max_triangles: 40000
  sector_repair:
    enabled: true
    mode: repair_coupled_group_compose
    probability: 0.08
  timeline:
    enabled: true
    sample_count: 8
    max_triangles: 10000
    persistence_cycles: 3

controls:
  - wrong_1x_normalization
  - wrong_pi_normalization
  - wrong_4pi_normalization
  - shuffled_observables
  - no_modular_flow
  - no_repair
  - shuffled_interfaces
  - random_same_degree_graph
  - wrong_s3_orientation
  - fake_record_rewrite

outputs:
  write_bw_report: true
  write_cap_geometry_report: true
  write_collar_markov_report: true
  write_state_derived_bw_report: true
  write_freezeout_cl_proxy: true
  write_dimension_report: false
