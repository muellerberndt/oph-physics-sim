name: e4_shared_observer_bulk_4k
run_mode: observer_shared_bulk_candidate
seed: 20260721
claim_boundary: >
  Observer-facing shared-bulk candidate diagnostic. This run combines finite
  state-derived BW/KMS cap flow, perturb-resettle modular-response-to-H3
  fitting, persistent observer-object extraction, neutral observer-record
  reconstruction, and S3 defect timeline diagnostics. It is not a 3D bulk,
  particle, or physical CMB claim unless the emitted gates pass.

graph:
  family: fibonacci_sphere
  patch_count: 4096
  neighbors: 12

group:
  name: S3

boundary_program:
  mode: support_visible_cap_net_hot
  cap_count: 32
  sharpness: 8.0
  tangent_weight: 0.35
  endpoint_noise_probability: 0.35

screen:
  chart: support_visible_s2_cellulation
  carrier: federated_echosahedral_patch
  ports_per_patch: 12
  cap_family: round_caps_on_s2

oph_constants:
  pixel_mode: source_candidate
  use_P_for:
  - cell_area
  - cell_entropy
  - cap_capacity
  - residual_weighting

screen_units:
  mode: numerical_regulator

dynamics:
  cycles: 64
  repairs_per_cycle: 4096
  record_commit_cycles: 8
  beta_schedule:
    kind: geometric
    beta_start: 0.05
    beta_end: 15.0

modular_flow:
  enabled: true
  dt: 0.03
  damping: 0.012
  repair_load_coupling: 0.35
  cap_coupling: 0.08
  diffusion: 0.06
  cap_axes: 20

bw:
  mode: state_derived_modular_probe
  state_mode: collar_operator_system
  target_operator_mode: permutation
  transition_response_time: 0.1
  transition_response_scale: 6.283185307179586
  generator_scale: 6.283185307179586
  cap_count: 4
  theta0: [0.35, 0.55, 0.75, 1.0]
  collar_width_mode: cell_scaled
  collar_k: 1.0
  generator_scale_candidates:
  - -6.283185307179586
  - 0.0
  - 1.0
  - 3.141592653589793
  - 6.283185307179586
  - 12.566370614359172
  times: [0.09, 0.17, 0.29]
  normalization: 2pi
  observables:
  - record_signature_projectors
  - repair_load_projectors
  - s3_sector_projectors
  - cumulative_repair_load_projectors
  regularizer_a: [0.001]
  max_basis: 48
  k_interp: 8
  sim_k_interp: 1
  n_jobs: auto
  support_visible_smoothing_steps: 4
  support_visible_smoothing_alpha: 0.35
  selection:
    enabled: true
    sources:
    - kms_collar_transport_response
    - perturb_remeasure_response
    - repair_affinity_response
    include_declared_sanity: true
    candidate_scales: [1.0, 3.141592653589793, 6.283185307179586, 12.566370614359172]
    times: [0.1]
    observables:
    - record_signature_projectors
    - repair_load_projectors
    - s3_sector_projectors
    - cumulative_repair_load_projectors
    max_basis: 48
    probe_steps: 4
    probe_repairs_per_source: 48
    probe_max_incident_edges: 12
    kms_response_scale: 6.283185307179586
    kms_transport_steps: 8

collar_markov:
  enabled: true
  max_triplets: 2048
  packet_bins:
    record_signature: 64
    stable_count: 8
    repair_load: 8
    s3_class_density: 6
  sector_conditioned: true
  write_recovery_bound: true

observers:
  sample_count: 128
  neighborhood_size: 64

observer_objects:
  enabled: true
  family_mode: transition_affinity
  packet_mode: coarse_visible_packet
  signature_bins: 12
  include_s3_sector: true
  include_repair_load_bin: false
  transition_history_fields:
  - record_family
  - checkpoint_class
  - stable_flag
  - s3_sector_class
  - repair_load_bucket
  transition_history_key_fields:
  - record_family
  - checkpoint_class
  - stable_flag
  - s3_sector_class
  - repair_load_bucket
  transition_persistence_fields:
  - record_family
  - s3_sector_class
  transition_affinity_fields:
  - checkpoint_class
  - record_family
  - s3_sector_class
  - repair_load_bucket
  - cumulative_repair_load_bucket
  transition_bins: 8
  record_family_modulus: 16
  min_support_size: 3
  max_support_nodes_per_family: 1024
  persistence_horizon: 8
  counterfactual_perturbations: 16
  max_families: 2048
  transition_history_local_min_persistence: 2

observer_chart_population:
  enabled: true
  incidence_mode: transition_history_mixture_cluster
  history_window: 4
  min_persistence: 3
  min_objects: 8
  min_observers_per_object: 3
  max_objects: 2048
  observer_cluster_fields:
  - local_transition_token
  - local_transition_token_persistent
  max_observer_fraction_per_object: 0.35
  min_packet_mass: 0.05
  min_transition_affinity: 0.18
  transition_affinity_score: geometric_mean
  max_h3_compactness: 0.45
  min_localized_objects: 2
  pass_ratio: 1.0
  observer_cluster_top_k: 3
  min_observer_cluster_weight: 0.05
  shuffle_control_count: 16
  split_h3_components: true
  component_link_fraction: 0.22
  component_min_observers: 3

neutral_reconstruction:
  enabled: true
  require_bw_refinement_pass: false
  forbid_radial_depth_evidence: true

h3_population:
  enabled: true
  source_state: freezeout
  response_mode: cap_transport_similarity
  transport_time: 0.10
  transport_scale: 6.283185307179586
  candidate_count: 2048
  candidate_radius: 2.0
  softness: 0.25
  pass_ratio: 0.85
  geometry_blend: 0.0
  field_names:
  - record_signature
  - stable_count
  - repair_load
  - cumulative_repair_load
  - local_mismatch_density
  - s3_class_density
  - s3_sector_class

h3_support_profiles:
  enabled: true
  dedicated_cap_net: true
  cap_count: 24
  theta0: [0.35, 0.55, 0.75, 1.0, 1.25]
  collar_width_mode: cell_scaled
  collar_k: 1.0
  candidate_count: 2048
  timeline_candidate_count: 8192
  timeline_response_mode: support_transport_similarity
  timeline_transport_time: 0.10
  timeline_transport_scale: 6.283185307179586
  candidate_radius: 2.0
  softness: 0.25
  pass_ratio: 0.85
  min_support_count: 8
  min_cap_count: 6

h3_modular_response:
  enabled: true
  observable_mode: perturb_resettle_transition
  times: [0.09, 0.17, 0.29]
  transition_observables:
  - checkpoint_class
  - stable_flag
  - record_family
  - s3_sector_class
  - repair_load_bucket
  transition_bins: 8
  record_family_modulus: 16
  feature_types:
  - class_distribution_delta
  - entropy_delta
  - sector_preservation_delta
  - change_probability_delta
  transform: signed_zscore
  perturb_strength: 1.0
  perturb_selection_mode: lambda_collar_generator
  repair_steps: 4
  repairs_per_step: 96
  wrong_scales: [1.0, 3.141592653589793, 12.566370614359172]
  transport_scale: 6.283185307179586
  k_transport: 1
  fit_mode: joint_global
  control_fit_mode: same_h3_model_not_affine_target_fit
  candidate_count: 2048
  candidate_radius: 2.0
  softness: 0.25
  heldout_fraction: 0.25
  anchor_weight: 0.05
  max_iterations: 4
  feature_selection: class_distribution_and_change
  min_feature_std: 0.0001
  max_fit_features: 512
  max_features_per_cap_time_observable: 8
  pass_ratio: 1.0
  min_observers: 16
  min_features: 16

theorem_core:
  projection_sample: 256
  include_default_sm_candidate: true

cosmology:
  freezeout:
    enabled: true
    require_kms_bw_pass: true
    require_state_bw_controls: false
    require_neutral_reconstruction: true
    allow_screen_proxy_without_bulk: true
    commit_fraction: 0.95
    fields:
    - record_signature
    - stable_count
    - cumulative_repair_load
    - repair_load
    - local_mismatch_density
    - s3_class_density
  angular_power:
    estimator: spherical_harmonic
    ell_max: 32
    harmonic_batch_size: 4096
    pair_samples: 50000
    controls:
    - shuffled_field
    - random_gaussian
  cmb_lite:
    enabled: true
    benchmark_path: data/measurements/planck2018/COM_PowerSpect_CMB-TT-binned_R3.01.txt
    benchmark_label: Planck2018_TT_binned
    source_url: https://irsa.ipac.caltech.edu/data/Planck/release_3/ancillary-data/cosmoparams/COM_PowerSpect_CMB-TT-binned_R3.01.txt

defects:
  max_triangles: 10000
  sector_repair:
    enabled: true
    mode: repair_coupled_group_compose
    probability: 0.08
  timeline:
    enabled: true
    sample_count: 8
    max_triangles: 3000
    persistence_cycles: 3

controls:
- wrong_1x_normalization
- wrong_pi_normalization
- wrong_4pi_normalization
- shuffled_observables
- no_modular_flow
- no_repair
- shuffled_interfaces
- random_same_degree_graph
- wrong_s3_orientation
- fake_record_rewrite

outputs:
  profile: evidence
  write_jsonl: true
  write_bw_report: true
  write_cap_geometry_report: true
  write_collar_markov_report: true
  write_state_derived_bw_report: true
  write_neutral_reconstruction: true
  write_freezeout_cl_proxy: true
  write_dimension_report: false
