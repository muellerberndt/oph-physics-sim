[cloud]
provider = "gcp"
project = "${GCP_PROJECT_ID}"
project_number = "${GCP_PROJECT_NUMBER}"
region = "${GCP_REGION}"
zone = "${GCP_ZONE}"
artifact_bucket = "${GCP_ARTIFACT_BUCKET}"

[worker]
purpose = "serious-simulation"
machine_type = "a4-highgpu-8g"
gpu_family = "NVIDIA_B200"
gpus_per_node = 8
nodes = 1
provisioning_model = "SPOT"
image_project = "deeplearning-platform-release"
image_family = "common-cu129-ubuntu-2204-nvidia-580"

[quota]
current_regional_gpu_limit = 0
target_regional_gpu_limit = 8
quota_metric = "NVIDIA_B200_GPUS"
note = "Requires a Google Cloud quota increase before this shape can launch."
