name: e1_s3_modular_screen_1m
seed: 20260601
claim_boundary: "Cloud-scale target config: 1M-patch S3 screen regulator plus sampled modular-flow record-history lift. CPU/RAM benchmark, not a physical proof."

graph:
  family: fibonacci_sphere
  patch_count: 1048576
  neighbors: 12
  edge_weight: 1.0

group:
  name: S3

screen:
  chart: support_visible_s2_cellulation
  carrier: federated_echosahedral_patch
  ports_per_patch: 12
  cap_family: round_caps_on_s2
  edge_sector_law: fixed_cutoff_heat_kernel_casimir_surrogate

oph_constants:
  P: 1.6309682094039593
  P_source: endpoint_public
  use_P_for:
    - cell_area
    - cell_entropy
    - cap_capacity
    - residual_weighting

screen_units:
  mode: numerical_regulator

initial_condition: maxent_hot

defects:
  count: 4096

modular_flow:
  enabled: true
  dt: 0.025
  damping: 0.01
  repair_load_coupling: 0.32
  cap_coupling: 0.07
  diffusion: 0.05
  cap_axes: 24
  trace_interval: 5

dynamics:
  cycles: 80
  repairs_per_cycle: 1048576
  repair: array_parallel_edge_repair
  hot_metropolis: true
  record_commit_cycles: 8
  beta_schedule:
    kind: geometric
    beta_start: 0.04
    beta_end: 18.0

observables:
  distance_source: modular_lift
  modular_lift:
    max_points: 500000
    center_samples: 8192
  dimension:
    - modular_lift_correlation
    - modular_lift_volume_growth
  bulk_embedding: sampled_modular_radial_screen_lift

output:
  write_full_state: false
  write_modular_depth_trace: false

controls:
  - no_repair
  - wrong_orientation
