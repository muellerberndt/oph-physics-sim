name: e1_s3_bw_screen_4k
seed: 20260601
claim_boundary: "Small finite regulator diagnostic for OPH BW/cap-modular emergence. Tests cap-flow covariance against lambda_C(2*pi*t); not a physical early-universe claim."

graph:
  family: fibonacci_sphere
  patch_count: 4096
  neighbors: 12
  edge_weight: 1.0

group:
  name: S3

screen:
  chart: support_visible_s2_cellulation
  carrier: federated_echosahedral_patch
  ports_per_patch: 12
  cap_family: round_caps_on_s2
  edge_sector_law: fixed_cutoff_heat_kernel_casimir_surrogate

oph_constants:
  P: 1.6309682094039593
  P_source: endpoint_public
  use_P_for:
    - cell_area
    - cell_entropy
    - cap_capacity
    - residual_weighting

screen_units:
  mode: numerical_regulator

modular_flow:
  enabled: true
  dt: 0.03
  damping: 0.012
  repair_load_coupling: 0.35
  cap_coupling: 0.08
  diffusion: 0.06
  cap_axes: 20

dynamics:
  cycles: 64
  repairs_per_cycle: 4096
  repair: array_parallel_edge_repair
  record_commit_cycles: 8
  beta_schedule:
    kind: geometric
    beta_start: 0.05
    beta_end: 15.0

bw:
  enabled: true
  cap_count: 24
  theta0: [0.35, 0.55, 0.75, 1.00, 1.25]
  collar_width_mode: cell_scaled
  collar_k: 1.0
  times: [0.025, 0.05, 0.10]
  normalization: "2pi"
  observables:
    - record_signature
    - repair_load
    - s3_class_density
    - stable_count
  interpolation: knn
  k_interp: 8
  sim_k_interp: 1
  n_jobs: 4
  support_visible_smoothing_steps: 4
  support_visible_smoothing_alpha: 0.35

cosmology:
  freezeout:
    enabled: false
    commit_fraction: 0.95
    fields:
      - record_signature
      - stable_count
      - cumulative_repair_load
      - s3_class_density
      - modular_depth
  angular_power:
    ell_max: 48
    pair_samples: 100000
    controls:
      - shuffled_field
      - random_gaussian

controls:
  - wrong_1x_normalization
  - wrong_pi_normalization
  - wrong_4pi_normalization
  - shuffled_caps
  - shuffled_observables
  - no_modular_flow

outputs:
  write_bw_report: true
  write_cap_geometry_report: true
  write_holonomy_trace: false
  write_dimension_report: false
  write_modular_lift_visualization: false
